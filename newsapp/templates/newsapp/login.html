{% extends "newsapp/base.html" %}
{% block title %}Login — News App{% endblock %}

{% block content %}
<div style="max-width:420px;margin:2rem auto;">
    <div class="card">
        <h1 style="font-size:1.4rem;margin-bottom:1.2rem;">Sign In</h1>

        {% if form.errors %}
        <div style="background:#f8d7da;color:#721c24;padding:0.7rem 1rem;border-radius:3px;font-family:sans-serif;font-size:0.9rem;margin-bottom:1rem;">
            Invalid username or password.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom:1rem;">
                <label style="display:block;font-family:sans-serif;font-size:0.85rem;margin-bottom:0.3rem;">Username</label>
                <input type="text" name="username" autofocus required
                    style="width:100%;padding:0.5rem 0.7rem;border:1px solid #ccc;border-radius:3px;font-size:0.95rem;">
            </div>
            <div style="margin-bottom:1.2rem;">
                <label style="display:block;font-family:sans-serif;font-size:0.85rem;margin-bottom:0.3rem;">Password</label>
                <input type="password" name="password" required
                    style="width:100%;padding:0.5rem 0.7rem;border:1px solid #ccc;border-radius:3px;font-size:0.95rem;">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:0.6rem;">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
